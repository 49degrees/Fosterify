<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fosterify</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Security headers -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self'; frame-ancestors 'none';">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">Fosterify</div>
  <div class="nav-links">
    <a href="#explore">Explore</a>
    <a href="#support">Get Support</a>
    <a href="#volunteer">Offer Help</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Find Your Path. Get Support. Move Forward.</h1>
  <p>Helping students discover opportunities and connect with real support.</p>
</section>

<!-- EXPLORE -->
<section id="explore" class="section">
  <h2>Explore Paths</h2>

  <div class="card">
    <label>What interests you?</label>
    <select id="interest">
      <option value="academic">Problem Solving / Academics</option>
      <option value="people">Working with People</option>
      <option value="creative">Creativity</option>
      <option value="sports">Sports</option>
      <option value="unsure">Not Sure</option>
    </select>

    <label>How do you want to try it?</label>
    <select id="style">
      <option value="competitive">Competitive</option>
      <option value="casual">Casual</option>
      <option value="mentorship">One-on-One</option>
    </select>

    <button id="showSuggestions" class="primary-btn">Show Suggestions</button>

    <div id="results"></div>
  </div>
</section>

<!-- GET SUPPORT -->
<section id="support" class="section alt">
  <h2>Get Support</h2>

  <form id="supportForm" class="card">
    <input type="text" name="name" placeholder="Your Name" required maxlength="100" pattern="[A-Za-z\s\-'.]+">
    <input type="text" name="school" placeholder="School" required maxlength="200">

    <select name="type">
      <option>Tutoring</option>
      <option>Mentorship</option>
      <option>Guidance</option>
    </select>

    <input type="text" name="subject" placeholder="What do you need help with?" required maxlength="500">

    <button type="submit" class="primary-btn">Request Help</button>
  </form>
</section>

<!-- OFFER HELP -->
<section id="volunteer" class="section">
  <h2>Offer Help</h2>

  <form id="volunteerForm" class="card">
    <input type="text" name="name" placeholder="Your Name" required maxlength="100" pattern="[A-Za-z\s\-'.]+">
    <input type="text" name="school" placeholder="School" required maxlength="200">

    <input type="text" name="skills" placeholder="What can you help with?" required maxlength="500">

    <button type="submit" class="primary-btn">Offer Help</button>
  </form>
</section>

<footer>
  <p>© 2026 Fosterify</p>
</footer>

<script src="script.js"></script>

</body>
</html>
